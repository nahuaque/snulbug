[mcp.proxy]
upstream = "http://mcp-upstream:9000"
policy = "policy.snulbug/policy.lua"
host = "0.0.0.0"
port = 8081
state = "memory"
trace = true
record_out = "traces/session.jsonl"
redact_records = true
confirm = false
max_body_bytes = 65536
response_max_bytes = 262144
response_redact_secrets = true
response_block_instructions = false
tool_pinning = false
tool_pinning_action = "block"
schema_validation = false
schema_validation_action = "block"
facade_health_routing = false
facade_health_failure_threshold = 2
facade_health_cooldown_seconds = 30.0
facade_health_exclude_unhealthy = true
lease_required = false
lease_header = "x-snulbug-lease"
tunnel_provider = "generic"
tunnel_public_url = "http://127.0.0.1:18081/mcp"
cloudflare_access = "off"
cloudflare_access_require_jwt = true
cloudflare_access_require_email = false
cloudflare_access_require_cf_ray = true
cloudflare_access_allowed_emails = []
cloudflare_access_allowed_domains = []
timeout = 10.0

[mcp.fabric]
name = "keycloak-oauth-demo"
description = "Turnkey Keycloak OAuth protected-resource demo"
gateway_url = "http://127.0.0.1:18081/mcp"
require_manifests = false
probe_gateway = true
probe_upstreams = true
timeout = 5.0

[[mcp.events.sinks]]
type = "audit_jsonl"
path = "traces/audit.jsonl"

[[mcp.events.sinks]]
type = "console"
format = "text"

[mcp.auth]
mode = "oauth-resource"
resource = "http://127.0.0.1:18081/mcp"
issuer = "http://localhost:8080/realms/snulbug-demo"
authorization_servers = ["http://localhost:8080/realms/snulbug-demo"]
audience = "http://127.0.0.1:18081/mcp"
required_scopes = ["mcp:connect"]
scopes_supported = ["mcp:connect", "mcp:tools.read", "mcp:tool.files.read", "mcp:tool.git.status"]
issuer_discovery = true
token_validation = "jwt"
strip_authorization_upstream = true

[mcp.auth.scope_map]
"mcp:tools.read" = ["tools/list", "resources/list"]
"mcp:tool.files.read" = [
  "tools/call:keycloak_demo.safe_read_file",
  "tools/call:keycloak_demo.list_project_files",
]
"mcp:tool.git.status" = ["tools/call:git.status"]
