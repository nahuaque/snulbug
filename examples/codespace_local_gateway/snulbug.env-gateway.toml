[mcp.fabric]
name = "codespace-env-gateway"
description = "Laptop snulbug gateway routing one Codespace MCP URL from SNULBUG_DISCOVERY_UPSTREAMS"
gateway_url = "http://127.0.0.1:8080/mcp"
require_manifests = false
probe_gateway = false
probe_upstreams = false
timeout = 5.0

[mcp.fabric.discovery]
enabled = true

[[mcp.fabric.discovery.providers]]
name = "codespace-env"
type = "env"
env = "SNULBUG_DISCOVERY_UPSTREAMS"
required = true

[mcp.proxy]
policy = "policy.lua"
host = "127.0.0.1"
port = 8080
state = "memory"
trace = true
record_out = "traces/codespace-env-session.jsonl"
audit_out = "traces/codespace-env-audit.jsonl"
redact_records = true
decision_console = true
decision_console_format = "text"
max_body_bytes = 65536
response_max_bytes = 262144
response_redact_secrets = true
tool_pinning = true
tool_pinning_action = "warn"
schema_validation = true
schema_validation_action = "warn"
facade_health_routing = true
facade_health_failure_threshold = 2
facade_health_cooldown_seconds = 10.0
facade_health_exclude_unhealthy = true
timeout = 30.0
