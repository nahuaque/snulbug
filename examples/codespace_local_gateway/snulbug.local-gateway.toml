[mcp.fabric]
name = "codespace-local-gateway"
description = "Laptop snulbug gateway routing remote Codespace MCP members"
gateway_url = "http://127.0.0.1:8080/mcp"
require_manifests = false
probe_gateway = false
probe_upstreams = false
timeout = 5.0

[mcp.fabric.discovery]
enabled = true

[[mcp.fabric.discovery.providers]]
name = "codespace-members"
type = "members"
state = "redis://YOUR_SHARED_REDIS:6379/0"
state_key = "snulbug:fabric:codespaces:members"
required = true

[mcp.proxy]
policy = "policy.lua"
host = "127.0.0.1"
port = 8080
state = "memory"
trace = true
record_out = "traces/codespace-session.jsonl"
audit_out = "traces/codespace-audit.jsonl"
redact_records = true
decision_console = true
decision_console_format = "text"
max_body_bytes = 65536
response_max_bytes = 262144
response_redact_secrets = true
tool_pinning = true
tool_pinning_action = "warn"
schema_validation = true
schema_validation_action = "warn"
facade_health_routing = true
facade_health_failure_threshold = 2
facade_health_cooldown_seconds = 10.0
facade_health_exclude_unhealthy = true
timeout = 30.0
