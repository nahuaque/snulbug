[project]
name = "uvicorn-lua"
version = "0.1.0"
description = "A programmable Lua request-policy middleware for ASGI apps served by Uvicorn"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "lupa>=2.5",
]

[project.scripts]
uvicorn-lua = "uvicorn_lua.simulator:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uvicorn_lua"]

[tool.pytest.ini_options]
pythonpath = ["."]
