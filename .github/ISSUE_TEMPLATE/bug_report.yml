name: Bug report
description: Report a reproducible problem in snulbug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve snulbug. Please include enough detail to reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior, expected behavior, and impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the Lua policy, request fixture, Python code, or command needed to reproduce it.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: snulbug version
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.1"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, ASGI server, framework, Lupa version, and state adapter if relevant.
